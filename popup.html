<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 200px; padding: 10px; font-family: sans-serif; }
    input { width: 100%; padding: 8px; box-sizing: border-box; margin-bottom: 10px; }
    button { width: 100%; padding: 8px; cursor: pointer; background: #0052cc; color: white; border: none; border-radius: 3px; }

    #historyContainer { display: flex; flex-direction: column; gap: 5px; }
    .history-item { 
        font-size: 12px; 
        color: #0052cc; 
        cursor: pointer; 
        text-decoration: underline;
        background: #f4f5f7;
        padding: 4px;
        border-radius: 3px;
    }
    .history-item:hover { background: #ebecf0; }
    hr { border: 0; border-top: 1px solid #ddd; margin: 15px 0; }
  </style>
</head>
<body>
  <input type="text" id="ticketNum" placeholder="e.g. 36123" autofocus>
  <button id="goBtn">Open Ticket</button>
  <hr>
    <div id="historyLabel" style="font-size: 10px; color: #666; margin-bottom: 5px;">RECENT:</div>
    <div id="historyContainer"></div>
  <script src="popup.js"></script>
</body>
</html>
